<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AFNSV GROOMING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{

overflow-x:hidden;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:25px;

background:
radial-gradient(circle at top,#4a3622 0%,#1d1d1d 35%,#090909 70%,#000 100%);

position:relative;

}

/* золотое свечение */

body::before{

content:"";

position:fixed;

width:700px;
height:700px;

background:radial-gradient(circle,
rgba(255,170,70,.20),
transparent 70%);

top:-250px;
left:50%;

transform:translateX(-50%);

filter:blur(80px);

animation:glow 8s ease-in-out infinite;

}

/* второй источник света */

body::after{

content:"";

position:fixed;

width:500px;
height:500px;

background:radial-gradient(circle,
rgba(255,255,255,.04),
transparent 70%);

bottom:-250px;
right:-150px;

filter:blur(80px);

}

@keyframes glow{

0%,100%{

transform:translateX(-50%) scale(1);

}

50%{

transform:translateX(-50%) scale(1.15);

}

}

/* карточка */

.card{

position:relative;

width:100%;
max-width:520px;

padding:50px 38px;

border-radius:35px;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.12);

backdrop-filter:blur(30px);

box-shadow:

0 25px 70px rgba(0,0,0,.55),

0 0 0 1px rgba(255,255,255,.03);

animation:cardAppear 1s cubic-bezier(.2,.8,.2,1);

}

@keyframes cardAppear{

from{

opacity:0;

transform:
translateY(60px)
scale(.92);

}

to{

opacity:1;

transform:
translateY(0)
scale(1);

}

}

/* логотип */

.logo{

display:block;

width:100%;
max-width:420px;

margin:0 auto;

filter:

drop-shadow(0 0 18px rgba(255,170,70,.55))

drop-shadow(0 0 45px rgba(255,140,0,.35));

animation:logo 1.3s ease;

}

@keyframes logo{

from{

opacity:0;

transform:
scale(.8)
translateY(-20px);

}

to{

opacity:1;

transform:
scale(1)
translateY(0);

}

}

.title{

margin-top:25px;

text-align:center;

font-size:42px;

font-weight:700;

letter-spacing:6px;

color:white;

}

.subtitle{

margin-top:18px;

text-align:center;

font-size:17px;

line-height:30px;

font-weight:300;

color:#d6d6d6;

}

.goldline{

margin:35px auto;

width:90px;
height:4px;

border-radius:20px;

background:linear-gradient(90deg,#ffcb73,#ff9f2f,#ffcb73);

box-shadow:0 0 18px rgba(255,180,60,.6);

}

.buttons{

margin-top:35px;

}

.btn{

height:66px;

border-radius:20px;

margin-bottom:18px;

background:rgba(255,255,255,.07);

border:1px solid rgba(255,255,255,.08);

}

.footer{

margin-top:35px;

text-align:center;

font-size:14px;

color:#9b9b9b;

letter-spacing:1px;

}

@media(max-width:520px){

.card{

padding:35px 25px;

}

.title{

font-size:34px;

letter-spacing:3px;

}

.logo{

max-width:360px;

}

}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1 class="title">
AFNSV
</h1>

<div class="subtitle">

Профессиональный груминг<br>

с любовью к каждому питомцу

</div>

<div class="goldline"></div>

<div class="buttons">

<a class="social telegram"
href="https://t.me/afnsv_groomer"
target="_blank">

</svg>

<span>Telegram</span>

</a>

<path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10.2 2a1.3 1.3 0 110 2.6 1.3 1.3 0 010-2.6zM12 6a6 6 0 110 12 6 6 0 010-12zm0 2a4 4 0 100 8 4 4 0 000-8z"/>

</div>

</div>

</body>

</html>
